<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0d12" />

    <title>traverc — a cozy hex roguelike pilgrimage</title>
    <meta
      name="description"
      content="Cross an unknown land one hex at a time. A small cozy roguelike with a daily-seed leaderboard. Reach the shrine. Don't die."
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Open Graph (Facebook, Discord, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="traverc" />
    <meta
      property="og:description"
      content="A small cozy roguelike pilgrimage. Reach the shrine. Don't die."
    />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="traverc" />
    <meta
      name="twitter:description"
      content="A small cozy roguelike pilgrimage. Reach the shrine. Don't die."
    />
    <meta name="twitter:image" content="/og-image.svg" />
  </head>
  <body>
    <header class="hud">
      <h1>traverc</h1>
      <p>Click an adjacent hex to step. Reach the shrine. Avoid the swamps. SPACE / ENTER to end your turn.</p>
    </header>
    <div id="game"></div>

    <div id="startScreen">
      <div class="startCard">
        <h2 class="startTitle">A pilgrimage</h2>
        <p class="startTagline">Cross the unknown. Reach the shrine. Beware the swamps and the bandits on the road.</p>

        <label class="startField">
          <span>Pilgrim's name</span>
          <input id="startName" type="text" maxlength="24" placeholder="Pilgrim" autocomplete="off" />
        </label>

        <fieldset class="startField">
          <legend>Robe</legend>
          <div id="startColors" class="colorGrid"></div>
          <p id="startLockedHint" class="lockedHint"></p>
        </fieldset>

        <p id="startStats" class="startStats"></p>

        <label class="dailyToggle">
          <input id="startDaily" type="checkbox" />
          <span>
            <strong>Today's pilgrimage</strong>
            <em id="startDailyDate"></em>
          </span>
        </label>

        <p id="startNameError" class="startNameError" hidden></p>

        <button id="startBegin" type="button">Begin pilgrimage</button>

        <section id="leaderboardPanel" class="leaderboardPanel" hidden>
          <h3>Today's pilgrims</h3>
          <ol id="leaderboardList" class="leaderboardList"></ol>
          <p id="leaderboardEmpty" class="leaderboardEmpty" hidden>No pilgrimages completed yet today. Be the first.</p>
        </section>
      </div>
    </div>

    <div id="runEndOverlay" hidden>
      <div class="runEndCard">
        <h2 id="runEndTitle"></h2>
        <p id="runEndSubtitle"></p>
        <p id="runEndStats"></p>
        <p id="runEndUnlocks" class="runEndUnlocks"></p>
        <button id="runEndButton" type="button">Start a new pilgrimage</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
